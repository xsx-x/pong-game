<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Pong Game</h1>
        <div class="scoreboard">
            <div class="score">
                <div class="label">Player</div>
                <div class="score-value" id="playerScore">0</div>
            </div>
            <div class="score">
                <div class="label">Computer</div>
                <div class="score-value" id="computerScore">0</div>
            </div>
        </div>
        <canvas id="pongCanvas" width="800" height="400"></canvas>
        <div class="controls">
            <p>Controls:</p>
            <ul>
                <li>Mouse Y-position or Arrow Keys (↑↓) to move left paddle</li>
                <li>Computer controls right paddle automatically</li>
                <li>First to 11 points wins!</li>
            </ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
